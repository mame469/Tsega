<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsega Milk - Contact</title>
    <link rel="stylesheet" href="tsestyle.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   
     </head>
<body>

    <header>
        <div class="logo">TSEGA MILK</div>
        <div class="menu-btn"><i class="fas fa-bars"></i></div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="abouttse.html">About</a>
            <a href="menutse.html">Menu</a>
            <a href="conttse.html" class="active">Contact</a>
        </nav>
    </header>

    <main class="contact-page">
        <h1 class="page-title reveal">CONTACT US</h1>
        
        <div class="contact-container">
            <!-- Info Section -->
            <div class="contact-info reveal">
                <div class="info-box">
                    <i class="fa-solid fa-location-dot custom-icon"></i>
                    <h3>Address</h3>
                    <p>Kazanchis, in front of SAS Pharmacy 
                        and around the A to Z apartment/Elilly Hotel area. Addis Ababa</p>
                </div>
                <h1 class="page-title reveal"></h1>
                <div class="info-box">
                    <i class="fa-solid fa-phone-volume custom-icon"></i>
                    <h3>Phone Number</h3>
                    <p>+251 90 257 6858</p>
                </div>
                <div class="social-box">
                    <h3>Follow Us</h3><br>
                      <div class="social-icons">
                        <a href="https://www.facebook.com/p/Tsega-Milk-100089756770350/"><i class="fa-brands fa-facebook-f"></i></a>
                        <a href="https://www.tiktok.com/@tsegamilk"><i class="fa-brands fa-tiktok"></i></a>
                        <a href="https://www.instagram.com/tsega_milk/"><i class="fa-brands fa-instagram"></i></a>
                    </div>
                </div>
            </div>
            
            <main class="contact-page">
        <h1 class="page-title reveal">GET IN TOUCH</h1> <br><br>
            <!-- Form Section -->
            <div class="contact-form reveal">
                <!-- Change your_email@gmail.com below to receive emails -->
                <form action="https://formsubmit.co/your_email@gmail.com" method="POST">
                    <input type="text" name="Phone" placeholder="Your Phone Number" required>
                    <input type="email" name="Email" placeholder="Your Email" required>
                    <input type="text" name="Subject" placeholder="Subject" required>
                    <textarea name="Message" rows="5" placeholder="Your Message" required></textarea>
                    <button type="submit" class="btn submit-btn">SUBMIT NOW <i class="fas fa-paper-plane"></i></button>
                </form>
            </div>
        </div>

        <!-- Modern Opening Hours -->
        <section class="hours-section reveal">
            <h2>OPENING HOURS</h2>
            <div class="hours-grid">
                <div class="hour-card highlight">
                    <h4>Monday - Sunday</h4>
                    <p>Open 24 hours</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Tsega Milk.</p>
    </footer>

    <script src="tsescript.js"></script>
</body>
</html>
